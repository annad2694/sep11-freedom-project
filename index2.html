<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
</head>
<body>
    <script>
        kaboom()
        setBackground(50, 50, 50) // dark gray background
        width: 800,
        height: 600,

        // the rectangles
        add([
            rect(400, 300),    // w x l
            pos(0, 0),       // x, y
            color(255, 0, 0),  // red
        ])

         add([
            rect(400, 300),    // w x l
            pos(400, 0),       // x, y
            color(0, 0, 225),  // blue
        ])

         add([
            rect(400, 300),    // w x l
            pos(0, 300),       // x, y
            color(0, 225, 0),  // green
        ])

         add([
            rect(400, 300),    // w x l
            pos(0, 300),       // x, y
            color(255, 225, 0),  // yellow
        ])
    </script>
</body>
</html>
