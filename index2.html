<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
</head>
<body>
    <script>
        kaboom({
            width: 800,   // w
            height: 600   // h
        })

        setBackground(50, 50, 50) // dark gray background

        // the rectangles
         var rectangle1 = add([
            rect(400, 300),    // w x l
            color(255, 0, 0),  // red
            area(), // toucable hitbox
            pos(0, 0),       // x, y
        ])

         var rectangle2 = add([
            rect(400, 300),    // w x l
            color(0, 0, 225),  // blue
            area(),
            pos(400, 0),       // x, y
        ])

         var rectangle3 = add([
            rect(400, 300),    // w x l
            color(0, 225, 0),  // green
            area(),
            pos(0, 300),       // x, y
        ])

         var rectangle4 = add([
            rect(400, 300),    // w x l
            color(255, 225, 0),  // yellow
            area(),
            pos(400, 300),      // x, y

        ])

        // the sequences
        var simonsSequence = [] //an array for the sequence that simon says
        var usersSequence = [] // an array for the sequence the user clicks
        function followingSequence() {
            usersSequence = []
            var randomNum = Math.floor(Math.random() * 4) // assigns the intergerts to the colored box
            simonsSequence.push(randomNum) // pushes to the end like an array
            showSequence()
        }

        // the flash (for the sequence of the rect)
        function flash(rect, r, g, b) { // the value of which rectangle to flash
            rect.color = rgb(255, 255, 255)
            wait(0.2, () => { // waits 0.2 seconds, then change back to original color
                rect.color = rgb(r, g, b)
            })
        }

        // the visual simon says/memory game pattern
            let i = 0 // becomes global
        function nextFlash() {
            if (i >= simonsSequence.length)
       var num = simonsSequence[i]
            if (num == 0) flash(rectangle1, 255, 0, 0)
            else if (num == 1) flash(rectangle2, 0, 0, 225)
            else if (num == 2) flash(rectangle3, 0, 225, 0)
            else if (num == 3) flash(rectangle4, 255, 225, 0)
            i++
            wait(0.6, nextFlash)
        }

        function showSequence() {
            i = 0
            wait(0.7, nextFlash)
        }

        // checks imput
        function checkInput() {
            var currentIndex = usersSequence.length - 1 // checks for last index
            if (usersSequence[currentIndex] !== simonsSequence[currentIndex]) { // !== means not equal to
                let message = add([
                    text("Game over"),
                    pos(300, 50)
                ])
        wait(1, () => destroy(message))
                simonsSequence = []
                followingSequence()
            }
            if (usersSequence.length === simonsSequence.length) { // opposite reaction --> if user is correct
                followingSequence()
            }
            }

            // clicker patterns
            //1
           rectangle1.onClick(() => {
            flash(rectangle1, 255, 0, 0)
            usersSequence.push(0) // red
            checkInput()
        })
            //2
            rectangle2.onClick(() => {
              flash(rectangle2, 0, 0, 225)
                usersSequence.push(1) // blue
                checkInput()
            })
                //3
            rectangle3.onClick(() => {
                flash(rectangle3, 0, 225, 0)
                usersSequence.push(2) // green
                checkInput()
            })
                //4
            rectangle4.onClick(() => {
                flash(rectangle4, 255, 225, 0)
                usersSequence.push(3) // yellow
                checkInput()
            })

        followingSequence() // to start next game
    </script>
</body>
</html>
